---

# jenkins variables
project_name: docker-bookstack
external_type: na
custom_version_command: "curl -sX GET 'https://codeberg.org/api/v1/repos/bookstack/bookstack/releases/latest' | jq -r '.tag_name'"
release_type: stable
release_tag: latest
ls_branch: master
repo_vars:
  - BUILD_VERSION_ARG = 'BOOKSTACK_RELEASE'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-bookstack'
  - CONTAINER_NAME = 'bookstack'
  - DOCKERHUB_IMAGE = 'linuxserver/bookstack'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/bookstack'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/bookstack'
  - DIST_IMAGE = 'alpine'
  - MULTIARCH = 'true'
  - CI = 'false'
  - CI_WEB = 'false'
  - CI_PORT = '80'
  - CI_SSL = 'false'
  - CI_DELAY = '60'
  - CI_DOCKERENV=''
  - CI_AUTH = ''
  - CI_WEBPATH = ''
sponsor_links:
  - { name: "Bookstack", url: "https://www.bookstackapp.com/donate/" }
